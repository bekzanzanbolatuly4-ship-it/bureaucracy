services:
  backend:
    build:
      context: ./backend
    environment:
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

